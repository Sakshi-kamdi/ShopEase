<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">🛍️ ShopEase</div>
    <div class="nav-links">
        <a href="#" onclick="showSection('products')">Products</a>
        <a href="#" onclick="showSection('cart')">Cart <span id="cart-count" class="badge">0</span></a>
        <a href="#" onclick="showSection('orders')">My Orders</a>
        <a href="#" onclick="showSection('admin')">Admin</a>
    </div>
</nav>

<div class="container">

    <!-- Products Section -->
    <div id="products-section">
        <div class="section-header">
            <h2>All Products</h2>
        </div>
        <div id="product-list" class="product-grid"></div>
    </div>

    <!-- Cart Section -->
    <div id="cart-section" style="display:none">
        <div class="section-header">
            <h2>Your Cart</h2>
        </div>
        <div id="cart-list"></div>
        <div id="cart-summary"></div>
        <div id="cart-actions"></div>
    </div>

    <!-- Checkout Section -->
    <div id="checkout-section" style="display:none">
        <div class="section-header">
            <h2>Checkout</h2>
        </div>
        <div class="form-box">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" placeholder="Enter your full name" />
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="cust-email" placeholder="Enter your email" />
            </div>
            <div class="form-group">
                <label>Delivery Address</label>
                <textarea id="cust-address" placeholder="Enter full delivery address" rows="3"></textarea>
            </div>
            <div id="order-total-display"></div>
            <button class="btn-primary btn-full" onclick="placeOrder()">Place Order</button>
            <button class="btn-secondary btn-full" onclick="showSection('cart')">Back to Cart</button>
        </div>
    </div>

    <!-- Orders Section -->
    <div id="orders-section" style="display:none">
        <div class="section-header">
            <h2>My Orders</h2>
        </div>
        <div id="order-list"></div>
    </div>

    <!-- Admin Section -->
    <div id="admin-section" style="display:none">
        <div class="section-header">
            <h2>Admin Panel — Add Product</h2>
        </div>
        <div class="form-box">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="prod-name" placeholder="e.g. Laptop" />
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="prod-desc" placeholder="e.g. High performance laptop" />
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="prod-price" placeholder="e.g. 45000" />
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" id="prod-qty" placeholder="e.g. 10" />
            </div>
            <div class="form-group">
                <label>Image URL (optional)</label>
                <input type="text" id="prod-img" placeholder="https://..." />
            </div>
            <button class="btn-primary btn-full" onclick="addProduct()">Add Product</button>
        </div>
        <div id="admin-msg"></div>
    </div>

</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
